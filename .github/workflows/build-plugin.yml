name: Build YouTube Plugin

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build plugin (skip tests)
        run: ./gradlew :plugin:assemble -x test --no-daemon

      - name: Print built files
        run: ls -lah plugin/build/libs

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: youtube-plugin-jar
          path: plugin/build/libs/*.jar
          if-no-files-found: error
